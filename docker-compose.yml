version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: focusai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: focusai
    volumes:
      - mongodb_data:/data/db
    networks:
      - focusai-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: focusai-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/focusai
      - AI_SERVICE_URL=http://ai-service:5001
    depends_on:
      - mongodb
      - ai-service
    networks:
      - focusai-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: focusai-ai-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - PORT=5001
    networks:
      - focusai-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: focusai-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - focusai-network

volumes:
  mongodb_data:

networks:
  focusai-network:
    driver: bridge